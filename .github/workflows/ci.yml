name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ========================================================
  # 1. Lint + Type Check
  # ========================================================
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Lint backend
        run: npm run lint --workspace=server
        continue-on-error: false

      - name: TypeScript check (server)
        run: npm run typecheck --workspace=server

      - name: TypeScript check (client)
        run: npm run typecheck --workspace=client

  # ========================================================
  # 2. Unit Tests (Vitest) + Coverage
  # ========================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: ./
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: algo_user
          POSTGRES_PASSWORD: algo_password
          POSTGRES_DB: algorithms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://algo_user:algo_password@localhost:5432/algorithms_test
      SHADOW_DATABASE_URL: postgresql://algo_user:algo_password@localhost:5432/algorithms_shadow
      JWT_SECRET: test-secret-for-ci-only
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Generate Prisma Client
        run: cd server && npx prisma generate

      - name: Run migrations
        run: cd server && npx prisma migrate deploy

      - name: Run Vitest with coverage
        run: cd server && npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/

  # ========================================================
  # 3. Build (client + server)
  # ========================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Generate Prisma Client
        run: cd server && npx prisma generate

      - name: Build server
        run: npm run build --workspace=server

      - name: Build client
        run: npm run build --workspace=client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            server/dist
            client/dist
          retention-days: 7

  # ========================================================
  # 4. E2E Tests (Playwright)
  # ========================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start application stack
        run: |
          docker-compose -f docker-compose.ci.yml up -d
          docker-compose -f docker-compose.ci.yml exec -T server npx prisma migrate deploy
          docker-compose -f docker-compose.ci.yml exec -T server npx prisma db seed

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  # ========================================================
  # 5. Deploy (только main, manual approval)
  # ========================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [unit-tests, build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://algorithms.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/algorithms-server:${{ github.sha }} ./server
          docker build -t ${{ secrets.DOCKER_USERNAME }}/algorithms-client:${{ github.sha }} ./client

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/algorithms-server:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/algorithms-client:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/algorithms-textbook
            git pull origin main
            export IMAGE_TAG=${{ github.sha }}
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T server npx prisma migrate deploy
            docker system prune -f

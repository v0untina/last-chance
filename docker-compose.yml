version: "3.8"

# Docker Compose для электронного учебника «Алгоритмы и структуры данных»
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Полная очистка: docker-compose down -v

services:
  db:
    image: postgres:15-alpine
    container_name: algorithms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-algo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-algo_password}
      POSTGRES_DB: algorithms_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-algo_user} -d algorithms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - algo-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: algorithms-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-algo_user}:${DB_PASSWORD:-algo_password}@db:5432/algorithms_db
      SHADOW_DATABASE_URL: postgresql://${DB_USER:-algo_user}:${DB_PASSWORD:-algo_password}@db:5432/algorithms_shadow
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      AI_RATE_LIMIT_WINDOW_MS: ${AI_RATE_LIMIT_WINDOW_MS:-60000}
      AI_RATE_LIMIT_MAX: ${AI_RATE_LIMIT_MAX:-20}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - algo-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: algorithms-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - algo-net

volumes:
  pgdata:
    driver: local

networks:
  algo-net:
    driver: bridge
